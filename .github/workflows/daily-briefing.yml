name: Daily Market Briefing

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate and save briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          
          curl -s https://api.anthropic.com/v1/messages \
            -H "anthropic-version: 2023-06-01" \
            -H "x-api-key: $ANTHROPIC_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"claude-sonnet-4-6\",
              \"max_tokens\": 4000,
              \"system\": \"Eres analista financiero senior. Responde SOLO con JSON valido sin texto adicional ni backticks. Estructura: {\\\"fecha\\\":\\\"string\\\",\\\"generado\\\":\\\"$TODAY\\\",\\\"sentimiento\\\":\\\"mixto\\\",\\\"nivel_riesgo\\\":\\\"Medio\\\",\\\"resumen\\\":\\\"string\\\",\\\"patron\\\":\\\"string\\\",\\\"noticias\\\":[{\\\"titular\\\":\\\"string\\\",\\\"explicacion\\\":\\\"string\\\",\\\"impacto\\\":\\\"Alcista\\\",\\\"activo\\\":\\\"string\\\",\\\"alerta\\\":false}],\\\"acciones\\\":[{\\\"sector\\\":\\\"string\\\",\\\"accion\\\":\\\"MANTENER\\\",\\\"confianza\\\":\\\"Alto\\\",\\\"horizonte\\\":\\\"medio\\\",\\\"motivo\\\":\\\"string\\\"}],\\\"oportunidades\\\":[\\\"string\\\"],\\\"riesgos\\\":[\\\"string\\\"],\\\"priorizar\\\":[\\\"string\\\"],\\\"evitar\\\":[\\\"string\\\"],\\\"senales_vigilar\\\":[\\\"string\\\"]}\",
              \"messages\": [{\"role\": \"user\", \"content\": \"Hoy es $TODAY. Busca las noticias financieras MAS IMPORTANTES de las ultimas 24h. Prioriza tipos interes, inflacion, earnings, geopolitica, IA, energia. pon alerta true en noticias criticas. Devuelve solo el JSON.\"}]
            }" > response.json
          
          python3 -c "
          import json, re, sys
          with open('response.json') as f:
              resp = json.load(f)
          blocks = resp.get('content', [])
          text = ''.join(b.get('text','') for b in blocks if b.get('type')=='text')
          match = re.search(r'\{[\s\S]*\}', text)
          if not match:
              print('ERROR: no JSON found')
              print(text[:300])
              sys.exit(1)
          parsed = json.loads(match.group(0))
          import os
          os.makedirs('docs', exist_ok=True)
          with open('docs/briefing.json', 'w', encoding='utf-8') as f:
              json.dump(parsed, f, ensure_ascii=False, indent=2)
          print('OK: briefing saved')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/briefing.json
          git diff --staged --quiet || git commit -m "briefing $(date +%Y-%m-%d)"
          git push
