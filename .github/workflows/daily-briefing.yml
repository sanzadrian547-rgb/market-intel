name: Daily Market Briefing

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          mkdir -p docs

          curl -s https://api.anthropic.com/v1/messages \
            -H "anthropic-version: 2023-06-01" \
            -H "x-api-key: $ANTHROPIC_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"claude-sonnet-4-6\",\"max_tokens\":3000,\"system\":\"Eres analista financiero. Responde SOLO con JSON valido sin backticks ni texto extra. Formato: {\\\"fecha\\\":\\\"string\\\",\\\"generado\\\":\\\"$TODAY\\\",\\\"sentimiento\\\":\\\"mixto\\\",\\\"nivel_riesgo\\\":\\\"Medio\\\",\\\"resumen\\\":\\\"string\\\",\\\"patron\\\":\\\"string\\\",\\\"noticias\\\":[{\\\"titular\\\":\\\"string\\\",\\\"explicacion\\\":\\\"string\\\",\\\"impacto\\\":\\\"Alcista\\\",\\\"activo\\\":\\\"string\\\",\\\"alerta\\\":false}],\\\"acciones\\\":[{\\\"sector\\\":\\\"string\\\",\\\"accion\\\":\\\"MANTENER\\\",\\\"confianza\\\":\\\"Alto\\\",\\\"horizonte\\\":\\\"medio\\\",\\\"motivo\\\":\\\"string\\\"}],\\\"oportunidades\\\":[\\\"string\\\"],\\\"riesgos\\\":[\\\"string\\\"],\\\"priorizar\\\":[\\\"string\\\"],\\\"evitar\\\":[\\\"string\\\"],\\\"senales_vigilar\\\":[\\\"string\\\"]}\",\"messages\":[{\"role\":\"user\",\"content\":\"Hoy es $TODAY. Analiza las noticias financieras mas importantes de hoy y devuelve SOLO el JSON.\"}]}" > raw.json

          python3 - << 'EOF'
import json, re, sys

with open('raw.json') as f:
    raw = f.read()

try:
    resp = json.loads(raw)
except Exception as e:
    print("Parse error:", e, raw[:300])
    sys.exit(1)

if resp.get('type') == 'error':
    print("API Error:", resp.get('error'))
    sys.exit(1)

text = ''.join(b.get('text','') for b in resp.get('content',[]) if b.get('type')=='text')
match = re.search(r'\{[\s\S]*\}', text)
if not match:
    print("No JSON found:", text[:300])
    sys.exit(1)

parsed = json.loads(match.group(0))

import os
os.makedirs('docs', exist_ok=True)
with open('docs/briefing.json', 'w', encoding='utf-8') as f:
    json.dump(parsed, f, ensure_ascii=False, indent=2)

print("OK saved for", parsed.get('generado'))
EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "briefing $(date +%Y-%m-%d)"
          git push
