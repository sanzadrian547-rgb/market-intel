name: Daily Market Briefing

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          mkdir -p docs

          curl -s https://api.anthropic.com/v1/messages \
            -H "anthropic-version: 2023-06-01" \
            -H "x-api-key: $ANTHROPIC_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"claude-sonnet-4-6","max_tokens":2000,"messages":[{"role":"user","content":"Responde SOLO con este JSON exacto sin cambiar nada: {\"fecha\":\"2 mayo 2026\",\"generado\":\"2026-05-02\",\"sentimiento\":\"bullish\",\"nivel_riesgo\":\"Medio\",\"resumen\":\"Mercados al alza hoy.\",\"patron\":\"Test\",\"noticias\":[{\"titular\":\"Test\",\"explicacion\":\"Test\",\"impacto\":\"Alcista\",\"activo\":\"SP500\",\"alerta\":false}],\"acciones\":[{\"sector\":\"Tech\",\"accion\":\"COMPRAR\",\"confianza\":\"Alto\",\"horizonte\":\"medio\",\"motivo\":\"Test\"}],\"oportunidades\":[\"Test\"],\"riesgos\":[\"Test\"],\"priorizar\":[\"Tech\"],\"evitar\":[\"Bonos\"],\"senales_vigilar\":[\"Test\"]}"}]}' > raw.json

          echo "=== RESPUESTA API ==="
          cat raw.json
          echo "====================="

          python3 - << 'EOF'
import json, re, sys

with open('raw.json') as f:
    raw = f.read()

try:
    resp = json.loads(raw)
except Exception as e:
    print("Parse error:", e)
    sys.exit(1)

if resp.get('type') == 'error':
    print("API Error:", resp.get('error'))
    sys.exit(1)

text = ''.join(b.get('text','') for b in resp.get('content',[]) if b.get('type')=='text')
match = re.search(r'\{[\s\S]*\}', text)
if not match:
    print("No JSON found in:", text[:500])
    sys.exit(1)

parsed = json.loads(match.group(0))
import os
os.makedirs('docs', exist_ok=True)
with open('docs/briefing.json', 'w', encoding='utf-8') as f:
    json.dump(parsed, f, ensure_ascii=False, indent=2)
print("OK:", parsed.get('generado'))
EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "briefing $(date +%Y-%m-%d)"
          git push
